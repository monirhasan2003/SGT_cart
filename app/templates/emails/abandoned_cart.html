<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ app_name }} — Your cart is waiting</title>
</head>
<body style="margin:0; padding:0; background:#f1f5f9; font-family:'Segoe UI',Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9; padding:32px 0;">
        <tr>
            <td align="center">
                <table width="480" cellpadding="0" cellspacing="0"
                       style="background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.08);">
                    <tr>
                        <td style="background:#0f172a; padding:24px; text-align:center;">
                            <h1 style="margin:0; color:#ffffff; font-size:22px;">{{ app_name }}</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px 32px 8px;">
                            <h2 style="margin:0 0 8px; color:#0f172a; font-size:20px;">Your cart is waiting</h2>
                            <p style="margin:0 0 24px; color:#475569; font-size:15px;">
                                Hello {{ user.name }}, you still have
                                <strong>{{ item_count }} item(s)</strong> worth
                                <strong>Tk {{ cart_value }}</strong> in your cart.
                                Complete your order before they sell out!
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 32px 32px; text-align:center;">
                            <a href="#" style="display:inline-block; background:#0f172a; color:#ffffff;
                                      text-decoration:none; border-radius:8px; padding:14px 36px;
                                      font-size:15px; font-weight:600;">Return to your cart</a>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 32px; background:#f8fafc; text-align:center;">
                            <p style="margin:0; color:#94a3b8; font-size:12px;">
                                &copy; {{ app_name }}
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
