<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ app_name }} — {{ heading }}</title>
</head>
<body style="margin:0; padding:0; background:#f1f5f9; font-family:'Segoe UI',Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9; padding:32px 0;">
        <tr>
            <td align="center">
                <table width="480" cellpadding="0" cellspacing="0"
                       style="background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.08);">
                    <tr>
                        <td style="background:#0f172a; padding:24px; text-align:center;">
                            <h1 style="margin:0; color:#ffffff; font-size:22px;">{{ app_name }}</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px 32px 8px;">
                            <h2 style="margin:0 0 8px; color:#0f172a; font-size:20px;">{{ heading }}</h2>
                            <p style="margin:0 0 24px; color:#475569; font-size:15px;">
                                Hello {{ user.name }}, {{ intro }}
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 32px 24px; text-align:center;">
                            <div style="display:inline-block; background:#f1f5f9; border:1px dashed #94a3b8;
                                        border-radius:8px; padding:16px 32px;">
                                <span style="font-size:34px; font-weight:700; letter-spacing:10px; color:#0f172a;">{{ code }}</span>
                            </div>
                            <p style="margin:16px 0 0; color:#94a3b8; font-size:13px;">
                                This code is valid for {{ minutes }} minutes. Do not share it with anyone.
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 32px; background:#f8fafc; text-align:center;">
                            <p style="margin:0; color:#94a3b8; font-size:12px;">
                                If you did not request this, you can safely ignore this email.<br>
                                &copy; {{ app_name }}
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
