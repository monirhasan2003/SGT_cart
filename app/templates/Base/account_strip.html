{% if current_user.is_authenticated and not is_impersonating %}
<div style="background:#0f172a; color:#fff; padding:6px 16px; font-size:13px;">
    <div style="display:flex; justify-content:flex-end; gap:16px; align-items:center;">
        <span><i class="lni lni-user me-1"></i>{{ current_user.name }}</span>
        <a href="{% if current_user.is_admin %}/admin/{% elif current_user.is_seller %}/seller/{% else %}/dashboard/{% endif %}"
           style="color:#fff; text-decoration:none;">
            <i class="lni lni-dashboard me-1"></i>Dashboard</a>
        <a href="/logout/" style="color:#fff; text-decoration:none; font-weight:600;">
            <i class="lni lni-power-switch me-1"></i>Logout</a>
    </div>
</div>
{% endif %}
