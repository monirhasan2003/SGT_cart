<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login — SGT Cart</title>
    <link href="{{ url_for('static', filename='assets/css/plugins/bootstrap.min.css') }}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background:#0f172a; min-height:100vh; }
        .admin-login-card {
            max-width:400px; margin:90px auto; background:#fff;
            border-radius:12px; padding:36px 32px; box-shadow:0 10px 40px rgba(0,0,0,0.35);
        }
        .admin-login-head { text-align:center; margin-bottom:24px; }
        .admin-login-head .bi { font-size:42px; color:#0f172a; }
    </style>
</head>
<body>
    <div class="admin-login-card">
        <div class="admin-login-head">
            <i class="bi bi-shield-lock"></i>
            <h4 class="mt-2 mb-0">SGT Admin</h4>
            <small class="text-secondary">Administrator sign-in</small>
        </div>

        {% include 'Base/flash_messages.html' %}

        <form method="post" action="{{ url_for('admin.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label class="form-label small">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Admin email" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label small">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-dark w-100">Sign In</button>
        </form>

        <div class="text-center mt-3">
            <a href="{{ url_for('main.index') }}" class="small text-secondary text-decoration-none">
                &larr; Back to store
            </a>
        </div>
    </div>
</body>
</html>
