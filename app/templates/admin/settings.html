{% extends "admin/base.html" %}
{% block title %}Settings{% endblock %}
{% block heading %}Platform Settings{% endblock %}
{% block content %}

<div class="panel p-4" style="max-width:620px;">
    <form method="post" action="{{ url_for('admin.settings') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
            <label class="form-label small">Site Name</label>
            <input type="text" name="site_name" class="form-control"
                   value="{{ settings.get('site_name', '') }}">
        </div>
        <div class="mb-3">
            <label class="form-label small">Default Commission Rate (%)</label>
            <input type="number" step="0.01" name="default_commission_rate" class="form-control"
                   value="{{ settings.get('default_commission_rate', '') }}">
            <small class="text-secondary">Applied to new seller accounts.</small>
        </div>
        <div class="mb-3">
            <label class="form-label small">Shipping Fee per Vendor (Tk)</label>
            <input type="number" step="0.01" name="shipping_fee_per_vendor" class="form-control"
                   value="{{ settings.get('shipping_fee_per_vendor', '') }}">
            <small class="text-secondary">Charged once per seller in an order.</small>
        </div>
        <div class="mb-3">
            <label class="form-label small">Currency Symbol</label>
            <input type="text" name="currency_symbol" class="form-control"
                   value="{{ settings.get('currency_symbol', '') }}">
        </div>

        <button type="submit" class="btn btn-dark">Save Settings</button>
    </form>
</div>

{% endblock %}
