<!-- Search -->
<div class="w3-ch-sideBar w3-bar-block w3-card-2 w3-animate-right" style="display:none;right:0;position:fixed;z-index:99999" id="Search">
    <div class="rightMenu-scroll">
        <div class="d-flex align-items-center justify-content-between slide-head py-3 px-3">
            <h4 class="cart_heading fs-md ft-medium mb-0">Search Products</h4>
            <button onclick="closeSearch()" class="close_slide"><i class="ti-close"></i></button>
        </div>
            
        <div class="cart_action px-3 py-4">
            <form class="form m-0 p-0" onsubmit="return sgtRunSearch();">
                <div class="form-group mb-2">
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Product Keyword.."
                               id="searchKeyword" list="searchSuggest" autocomplete="off" />
                        <button type="button" id="micBtn" class="btn btn-outline-dark"
                                title="Search by voice">
                            <i class="lni lni-microphone-alt"></i>
                        </button>
                    </div>
                    <datalist id="searchSuggest"></datalist>
                </div>

                <div class="form-group mb-2">
                    <a href="{{ url_for('storefront.search_by_image') }}"
                       class="btn btn-outline-secondary btn-sm d-block">
                        <i class="lni lni-camera me-1"></i>Search by image
                    </a>
                </div>

                <div class="form-group mb-0">
                    <button type="submit" class="btn d-block full-width btn-dark" id="searchBtn">Search Product</button>
                </div>
            </form>

            <script>
                (function () {
                    var box = document.getElementById("searchKeyword");
                    var list = document.getElementById("searchSuggest");
                    if (!box || !list) return;
                    var timer = null;
                    box.addEventListener("input", function () {
                        var q = box.value.trim();
                        clearTimeout(timer);
                        if (q.length < 2) { list.innerHTML = ""; return; }
                        timer = setTimeout(function () {
                            fetch("/search/suggest?q=" + encodeURIComponent(q))
                                .then(function (r) { return r.json(); })
                                .then(function (d) {
                                    list.innerHTML = "";
                                    (d.suggestions || []).forEach(function (s) {
                                        var o = document.createElement("option");
                                        o.value = s.title;
                                        list.appendChild(o);
                                    });
                                }).catch(function () {});
                        }, 200);
                    });
                })();
                function sgtRunSearch() {
                    var q = (document.getElementById("searchKeyword").value || "").trim();
                    window.location.href = "/shop/" + (q ? "?q=" + encodeURIComponent(q) : "");
                    return false;
                }

                // Voice search — browser Web Speech API (Chrome / Edge).
                (function () {
                    var mic = document.getElementById("micBtn");
                    var input = document.getElementById("searchKeyword");
                    if (!mic || !input) return;
                    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (!SR) { mic.style.display = "none"; return; }
                    var recognizer = new SR();
                    recognizer.lang = (document.documentElement.lang || "en") === "bn" ? "bn-BD" : "en-US";
                    recognizer.interimResults = false;
                    recognizer.maxAlternatives = 1;
                    mic.addEventListener("click", function () {
                        try { recognizer.start(); mic.classList.add("active"); } catch (e) {}
                    });
                    recognizer.onresult = function (event) {
                        input.value = event.results[0][0].transcript;
                        input.dispatchEvent(new Event("input"));
                        sgtRunSearch();
                    };
                    recognizer.onend = function () { mic.classList.remove("active"); };
                    recognizer.onerror = function () { mic.classList.remove("active"); };
                })();
            </script>
        </div>
