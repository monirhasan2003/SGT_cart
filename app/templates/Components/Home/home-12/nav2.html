{% for item in navs2 %}
    <li class="nav-item" role="presentation">
        <a class="nav-link {{ item.class }}" id="{{ item.id }}" href="{{ item.link }}" data-bs-toggle="tab" role="tab" aria-controls="{{ item.controls }}" aria-selected="{{ item.selected }}">{{ item.title }}</a>
    </li>
{% endfor %}
